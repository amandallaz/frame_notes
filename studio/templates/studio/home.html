{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frame Notes</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: #f5f0ea;
    }
    .landing {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
    }
    .landing__photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Soft darken so type reads on any photo */
    .landing__shade {
      position: absolute;
      inset: 0;
      background: rgba(40, 32, 28, 0.4);
    }
    /* Architect-style square grid */
    .landing__grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 248, 240, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 248, 240, 0.1) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }
    .landing__copy {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: 24vh 1.5rem 1.5rem;
      gap: 0.65rem;
    }
    .landing__eyebrow {
      margin: 0;
      font-size: clamp(0.95rem, 3.5vw, 1.15rem);
      font-weight: 500;
      letter-spacing: 0.08em;
      color: rgba(248, 240, 232, 0.92);
    }
    .landing__line {
      margin: 0.15rem 0 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.05rem, 4.2vw, 1.35rem);
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.01em;
      line-height: 1.45;
      max-width: min(92vw, 26rem);
      color: rgba(252, 246, 240, 0.88);
    }
    .landing__cta {
      margin-top: 2.25rem;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: rgba(248, 240, 232, 0.8);
      border-bottom: 1px solid rgba(212, 165, 116, 0.65);
      padding-bottom: 3px;
    }
    .landing__cta:hover {
      color: rgba(252, 246, 240, 0.98);
      border-bottom-color: rgba(232, 185, 136, 0.95);
    }
  </style>
</head>
<body>
  <main class="landing">
    <img
      class="landing__photo"
      src="{% static 'studio/images/hero.jpg' %}"
      alt=""
    >
    <div class="landing__shade" aria-hidden="true"></div>
    <div class="landing__grid" aria-hidden="true"></div>
    <div class="landing__copy">
      <p class="landing__eyebrow">Frame Notes</p>
      <p class="landing__line">Plan shoots. Track rolls. Shape prints.</p>
      <a class="landing__cta" href="{% url 'project_list' %}">View projects →</a>
    </div>
  </main>
</body>
</html>
