# Frame Notes at https://amandalaz.com/framenotes/
# Requires DJANGO_SCRIPT_NAME=/framenotes in .env

upstream frame_notes_app {
    server unix:/var/www/frame_notes/run/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    server_name amandalaz.com www.amandalaz.com 67.205.143.130;

    client_max_body_size 25M;

    location ~ ^/framenotes/static/(.*)$ {
        alias /var/www/frame_notes/staticfiles/$1;
    }

    # Strip /framenotes/ before proxying so Django sees /, /login/, etc.
    location /framenotes/ {
        proxy_pass http://frame_notes_app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
