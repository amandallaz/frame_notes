# Frame Notes at https://amandalaz.com/framenotes/
# Set server_name to your domain. Requires DJANGO_SCRIPT_NAME=/framenotes in .env

server {
    listen 80;
    server_name amandalaz.com www.amandalaz.com;

    client_max_body_size 25M;

    location /framenotes/static/ {
        alias /var/www/frame_notes/staticfiles/;
    }

    location /framenotes/ {
        proxy_pass http://unix:/var/www/frame_notes/run/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
