# Frame Notes at https://framenotes.amandalaz.com/

upstream frame_notes_app {
    server unix:/var/www/frame_notes/run/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    server_name framenotes.amandalaz.com 67.205.143.130;

    client_max_body_size 500M;

    location /static/ {
        alias /var/www/frame_notes/staticfiles/;
    }

    location / {
        proxy_pass http://frame_notes_app;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
