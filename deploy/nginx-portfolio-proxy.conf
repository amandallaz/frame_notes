# Add INSIDE the existing amandalaz.com server { } block on your PORTFOLIO droplet.
# Frame Notes runs on 67.205.143.130 (update IP if it changes).

    location /framenotes/static/ {
        proxy_pass http://67.205.143.130/framenotes/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /framenotes/ {
        proxy_pass http://67.205.143.130/framenotes/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
